name: CI/CD + MLOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python test_model.py


  mlops:
    runs-on: ubuntu-latest
    needs: test   #  runs after test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ML pipeline
        run: python train.py   # make sure this file exists


  docker:
    runs-on: ubuntu-latest
    needs: mlops   #  runs after mlops

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app .

      - name: Run Docker container
        run: docker run my-app